<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>樹窿 - Tree Hollow</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --neon: #00ff88;
    --neon-dim: #00cc66;
    --accent: #ff6b9d;
    --gold: #ffd700;
    --panel: #111122;
    --text: #c0ffe0;
    --trunk: #4a3728;
    --trunk-light: #6b4c3b;
  }

  body {
    background: var(--bg);
    font-family: 'VT323', 'Courier New', monospace;
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── STARFIELD BACKGROUND ─── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 2;
    text-align: center; padding: 20px 16px 8px;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3.5vw, 22px);
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon), 0 0 30px var(--neon), 0 0 60px var(--neon-dim);
    letter-spacing: 4px;
    image-rendering: pixelated;
  }
  header .subtitle {
    font-size: 20px; color: #88aacc; margin-top: 6px;
    letter-spacing: 3px;
  }
  .leaf-counter {
    font-size: 18px; color: var(--gold);
    margin-top: 8px;
    text-shadow: 0 0 8px var(--gold);
  }
  .leaf-counter span { font-size: 26px; font-weight: bold; }

  /* ─── CANVAS CONTAINER ─── */
  #tree-container {
    position: relative; z-index: 2;
    width: 100%; max-width: 500px;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #treeCanvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ─── SHAKE HINT ─── */
  .shake-hint {
    position: relative; z-index: 2;
    font-size: 16px; color: #667799;
    text-align: center; padding: 4px 16px;
    animation: pulse-hint 2.5s ease-in-out infinite;
    letter-spacing: 2px;
  }
  @keyframes pulse-hint {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ─── INPUT AREA ─── */
  #input-area {
    position: relative; z-index: 2;
    width: 100%; max-width: 500px;
    padding: 0 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #confession-input {
    width: 100%; height: 80px;
    background: var(--panel);
    border: 3px solid #334;
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 1px;
    line-height: 1.4;
  }
  #confession-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(0,255,136,0.2), inset 0 0 8px rgba(0,255,136,0.05);
  }
  #confession-input::placeholder {
    color: #445566; letter-spacing: 2px;
  }
  #submit-btn {
    width: 100%; padding: 16px;
    background: #112211;
    border: 3px solid var(--neon);
    color: var(--neon);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 2.5vw, 14px);
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.2s;
    text-shadow: 0 0 6px var(--neon);
    image-rendering: pixelated;
    position: relative;
    overflow: hidden;
  }
  #submit-btn:hover, #submit-btn:active {
    background: #1a3a2a;
    box-shadow: 0 0 24px rgba(0,255,136,0.4), inset 0 0 16px rgba(0,255,136,0.1);
    transform: scale(1.02);
  }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled {
    opacity: 0.4; pointer-events: none;
  }

  /* ─── FLYING LEAF ─── */
  .flying-leaf {
    position: fixed; z-index: 10;
    pointer-events: none;
    font-size: 28px;
    filter: drop-shadow(0 0 8px var(--neon));
    transition: none;
  }

  /* ─── MODAL OVERLAY ─── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  #modal-overlay.active { opacity: 1; pointer-events: all; }

  #modal-card {
    background: var(--panel);
    border: 4px solid var(--gold);
    padding: 28px 24px;
    max-width: 380px; width: 90%;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,215,0,0.3), 0 0 80px rgba(255,215,0,0.1);
    image-rendering: pixelated;
  }
  #modal-card .leaf-icon {
    font-size: 48px; margin-bottom: 12px;
    animation: leaf-spin 0.8s ease-out;
  }
  @keyframes leaf-spin {
    0% { transform: rotate(0deg) scale(0); opacity: 0; }
    60% { transform: rotate(720deg) scale(1.3); opacity: 1; }
    100% { transform: rotate(720deg) scale(1); opacity: 1; }
  }
  #modal-card .confession-text {
    font-size: 22px; color: var(--text);
    line-height: 1.5; margin: 12px 0;
    letter-spacing: 1px;
    word-break: break-word;
  }
  #modal-card .close-btn {
    margin-top: 16px; padding: 10px 32px;
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: 'Press Start 2P', monospace;
    font-size: 12px; cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  #modal-card .close-btn:hover {
    background: rgba(255,215,0,0.15);
    box-shadow: 0 0 16px rgba(255,215,0,0.4);
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: var(--panel); border: 2px solid var(--neon);
    color: var(--neon); padding: 12px 28px;
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 2s forwards;
    letter-spacing: 2px;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }
  @keyframes toast-out { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 400px) {
    header h1 { font-size: 12px; }
    #confession-input { height: 68px; font-size: 18px; }
  }
</style>
</head>
<body>

<!-- Starfield -->
<canvas id="starfield"></canvas>

<!-- Header -->
<header>
  <h1>🌳 樹 窿 🌳</h1>
  <div class="subtitle">講低你嘅心事，掛喺樹上面</div>
  <div class="leaf-counter">樹上共有 <span id="leaf-count">0</span> 片葉</div>
</header>

<!-- Tree Canvas -->
<div id="tree-container">
  <canvas id="treeCanvas"></canvas>
</div>

<!-- Shake Hint -->
<div class="shake-hint" id="shake-hint">📳 搖一搖電話，睇吓人哋嘅心事</div>

<!-- Input Area -->
<div id="input-area">
  <textarea id="confession-input" placeholder="喺度寫低你嘅心事..." maxlength="280"></textarea>
  <button id="submit-btn">講 比 樹 窿</button>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-card">
    <div class="leaf-icon">🍂</div>
    <div class="confession-text" id="modal-text"></div>
    <button class="close-btn" id="modal-close">關 閉</button>
  </div>
</div>

<script>
// ─────────────────────────────────────
//  STARFIELD
// ─────────────────────────────────────
const starCanvas = document.getElementById('starfield');
const starCtx = starCanvas.getContext('2d');
let stars = [];

function resizeStarfield() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
function createStars() {
  stars = [];
  const count = Math.floor((starCanvas.width * starCanvas.height) / 1200);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.01 + Math.random() * 0.03,
    });
  }
}
function drawStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.3 + 0.4 * Math.sin(s.twinkle);
    starCtx.fillStyle = `rgba(180,200,255,${alpha})`;
    starCtx.fillRect(Math.round(s.x), Math.round(s.y), Math.ceil(s.r), Math.ceil(s.r));
  }
  requestAnimationFrame(drawStars);
}
resizeStarfield();
createStars();
drawStars();
window.addEventListener('resize', () => { resizeStarfield(); createStars(); });

// ─────────────────────────────────────
//  TREE CANVAS
// ─────────────────────────────────────
const treeCanvas = document.getElementById('treeCanvas');
const treeCtx = treeCanvas.getContext('2d');
const PIXEL = 6; // pixel size

function resizeTree() {
  const container = document.getElementById('tree-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  treeCanvas.width = w;
  treeCanvas.height = h;
  drawTree();
}
window.addEventListener('resize', resizeTree);

// ─────────────────────────────────────
//  PIXEL ART TREE DRAWING
// ─────────────────────────────────────
// Tree definition: arrays of [col, row] pixel blocks
const TRUNK_COLOR = '#4a3728';
const TRUNK_HIGHLIGHT = '#6b4c3b';
const TRUNK_DARK = '#2e1f14';
const CANOPY_DARK = '#1a5c2a';
const CANOPY_MID = '#228b22';
const CANOPY_LIGHT = '#2ecc40';
const CANOPY_HIGHLIGHT = '#5eff6e';

function buildTreePixels() {
  const pixels = [];
  const cx = Math.floor(treeCanvas.width / 2 / PIXEL);
  const baseY = Math.floor(treeCanvas.height * 0.92 / PIXEL);

  // Trunk
  for (let row = baseY - 18; row <= baseY; row++) {
    const trunkW = row > baseY - 14 ? 4 : 5;
    const startX = cx - Math.floor(trunkW / 2);
    for (let i = 0; i < trunkW; i++) {
      const col = startX + i;
      const color = (i === 0 || i === trunkW - 1) && row < baseY - 2 ? TRUNK_DARK
        : (i === 2) ? TRUNK_HIGHLIGHT : TRUNK_COLOR;
      pixels.push({ col, row, color });
    }
  }

  // Canopy - layered circles of pixel blocks
  const canopyLayers = [
    { cy: baseY - 28, r: 12, color: CANOPY_DARK },
    { cy: baseY - 33, r: 14, color: CANOPY_MID },
    { cy: baseY - 38, r: 15, color: CANOPY_MID },
    { cy: baseY - 43, r: 14, color: CANOPY_LIGHT },
    { cy: baseY - 47, r: 12, color: CANOPY_LIGHT },
    { cy: baseY - 50, r: 9, color: CANOPY_HIGHLIGHT },
    { cy: baseY - 53, r: 6, color: CANOPY_HIGHLIGHT },
  ];

  for (const layer of canopyLayers) {
    for (let dr = -layer.r; dr <= layer.r; dr++) {
      for (let dc = -layer.r; dc <= layer.r; dc++) {
        if (dr * dr + dc * dc <= layer.r * layer.r && Math.random() > 0.15) {
          const col = cx + dc;
          const row = layer.cy + dr;
          const existing = pixels.find(p => p.col === col && p.row === row);
          if (!existing) {
            const shade = Math.random();
            const color = shade < 0.15 ? CANOPY_HIGHLIGHT
              : shade < 0.4 ? CANOPY_LIGHT
              : shade < 0.75 ? CANOPY_MID
              : CANOPY_DARK;
            pixels.push({ col, row, color });
          }
        }
      }
    }
  }

  return { pixels, cx, baseY };
}

let treeData = null;

function drawTree() {
  treeData = buildTreePixels();
  renderTree();
}

function renderTree() {
  treeCtx.clearRect(0, 0, treeCanvas.width, treeCanvas.height);

  // Draw ground
  const groundY = Math.floor(treeCanvas.height * 0.96);
  treeCtx.fillStyle = '#1a2a1a';
  treeCtx.fillRect(0, groundY, treeCanvas.width, treeCanvas.height - groundY);
  // Ground pixel detail
  for (let x = 0; x < treeCanvas.width; x += PIXEL * 2) {
    treeCtx.fillStyle = Math.random() > 0.5 ? '#2a3a2a' : '#1a2a1a';
    treeCtx.fillRect(x, groundY, PIXEL * 2, PIXEL * 2);
  }

  if (!treeData) return;

  // Draw tree pixels
  for (const p of treeData.pixels) {
    treeCtx.fillStyle = p.color;
    treeCtx.fillRect(p.col * PIXEL, p.row * PIXEL, PIXEL, PIXEL);
  }

  // Draw leaves
  for (const leaf of leaves) {
    drawLeaf(leaf);
  }
}

// ─────────────────────────────────────
//  LEAVES
// ─────────────────────────────────────
const LEAF_COLORS = ['#ff6b3d','#ff8c42','#ffaa33','#ffcc00','#e63946','#f4a261','#e76f51','#d4a373','#faedcd','#ccd5ae'];
const LEAF_SHAPES = ['🍂','🍁','🍃','🌿','🍀','🪹'];

class Leaf {
  constructor(text) {
    this.id = Date.now() + Math.random();
    this.text = text;
    this.color = LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)];
    this.emoji = LEAF_SHAPES[Math.floor(Math.random() * LEAF_SHAPES.length)];
    this.size = 10 + Math.random() * 8; // pixel size
    // Position within canopy
    if (treeData) {
      const canopyPixels = treeData.pixels.filter(p =>
        p.color !== TRUNK_COLOR && p.color !== TRUNK_HIGHLIGHT && p.color !== TRUNK_DARK &&
        p.color !== CANOPY_DARK
      );
      const pick = canopyPixels[Math.floor(Math.random() * canopyPixels.length)] || { col: treeData.cx, row: treeData.baseY - 40 };
      this.col = pick.col + (Math.random() - 0.5) * 6;
      this.row = pick.row + (Math.random() - 0.5) * 4;
    } else {
      this.col = treeData?.cx || 0;
      this.row = (treeData?.baseY || 0) - 40;
    }
    this.wobble = Math.random() * Math.PI * 2;
  }
}

let leaves = [];

function loadLeaves() {
  try {
    const raw = localStorage.getItem('treehollow_leaves');
    if (raw) {
      const data = JSON.parse(raw);
      leaves = data.map(d => Object.assign(new Leaf(''), d));
    }
  } catch(e) { leaves = []; }
}

function saveLeaves() {
  localStorage.setItem('treehollow_leaves', JSON.stringify(leaves));
}

function drawLeaf(leaf) {
  const x = leaf.col * PIXEL;
  const y = leaf.row * PIXEL;
  treeCtx.save();
  treeCtx.translate(x, y);
  treeCtx.rotate(Math.sin(leaf.wobble + performance.now() * 0.001) * 0.15);
  // Pixel leaf shape
  const s = leaf.size;
  treeCtx.fillStyle = leaf.color;
  // Simple diamond pixel leaf
  treeCtx.fillRect(0, -s, 2, s * 2);
  treeCtx.fillRect(-2, -s * 0.6, 2, s * 1.2);
  treeCtx.fillRect(2, -s * 0.6, 2, s * 1.2);
  treeCtx.fillRect(-4, -s * 0.2, 2, s * 0.6);
  treeCtx.fillRect(4, -s * 0.2, 2, s * 0.6);
  // stem
  treeCtx.fillStyle = '#8B7355';
  treeCtx.fillRect(-1, s, 2, 4);
  treeCtx.restore();
}

// ─────────────────────────────────────
//  ANIMATION LOOP
// ─────────────────────────────────────
function animate() {
  renderTree();
  document.getElementById('leaf-count').textContent = leaves.length;
  requestAnimationFrame(animate);
}

// ─────────────────────────────────────
//  FLYING LEAF ANIMATION
// ─────────────────────────────────────
function animateFlyingLeaf(fromEl, leaf) {
  const fromRect = fromEl.getBoundingClientRect();
  const containerRect = treeCanvas.getBoundingClientRect();

  const targetX = leaf.col * PIXEL + containerRect.left;
  const targetY = leaf.row * PIXEL + containerRect.top;

  const el = document.createElement('div');
  el.className = 'flying-leaf';
  el.textContent = leaf.emoji;
  el.style.left = (fromRect.left + fromRect.width / 2 - 14) + 'px';
  el.style.top = (fromRect.top + fromRect.height / 2 - 14) + 'px';
  el.style.fontSize = '18px';
  el.style.transition = 'all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  document.body.appendChild(el);

  requestAnimationFrame(() => {
    el.style.left = targetX + 'px';
    el.style.top = targetY + 'px';
    el.style.fontSize = '8px';
    el.style.opacity = '0.4';
  });

  setTimeout(() => el.remove(), 1100);
}

// ─────────────────────────────────────
//  SUBMIT CONFESSION
// ─────────────────────────────────────
const inputEl = document.getElementById('confession-input');
const submitBtn = document.getElementById('submit-btn');

submitBtn.addEventListener('click', () => {
  const text = inputEl.value.trim();
  if (!text) return;

  submitBtn.disabled = true;
  const leaf = new Leaf(text);
  leaves.push(leaf);
  saveLeaves();

  animateFlyingLeaf(inputEl, leaf);

  inputEl.value = '';
  setTimeout(() => { submitBtn.disabled = false; inputEl.focus(); }, 1100);
});

// Enter to submit (shift+enter for newline)
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitBtn.click();
  }
});

// ─────────────────────────────────────
//  SHAKE DETECTION
// ─────────────────────────────────────
let lastShakeTime = 0;
const SHAKE_THRESHOLD = 18;
const SHAKE_COOLDOWN = 2000;

function handleMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const mag = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
  const now = Date.now();

  if (mag > SHAKE_THRESHOLD && now - lastShakeTime > SHAKE_COOLDOWN && leaves.length > 0) {
    lastShakeTime = now;
    dropRandomLeaf();
  }
}

function dropRandomLeaf() {
  if (leaves.length === 0) return;
  const idx = Math.floor(Math.random() * leaves.length);
  const leaf = leaves.splice(idx, 1)[0];
  saveLeaves();

  // Show the confession
  showModal(leaf);
}

function showModal(leaf) {
  const overlay = document.getElementById('modal-overlay');
  const textEl = document.getElementById('modal-text');
  document.querySelector('#modal-card .leaf-icon').textContent = leaf.emoji;
  textEl.textContent = leaf.text;
  overlay.classList.add('active');

  // Restart leaf spin animation
  const icon = document.querySelector('#modal-card .leaf-icon');
  icon.style.animation = 'none';
  icon.offsetHeight;
  icon.style.animation = 'leaf-spin 0.8s ease-out';
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('active');
  // Put leaf back on tree
  const leaf = new Leaf(document.getElementById('modal-text').textContent);
  leaves.push(leaf);
  saveLeaves();
});

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modal-close').click();
  }
});

// Request motion permission (iOS)
async function requestMotionPermission() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const resp = await DeviceMotionEvent.requestPermission();
      if (resp === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
      }
    } catch(e) {
      showToast('未能獲取動作權限 😢');
    }
  } else {
    window.addEventListener('devicemotion', handleMotion);
  }
}

// ─────────────────────────────────────
//  TOAST
// ─────────────────────────────────────
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ─────────────────────────────────────
//  DESKTOP FALLBACK: CLICK TREE TO DROP
// ─────────────────────────────────────
treeCanvas.addEventListener('click', (e) => {
  if (leaves.length === 0) return;
  const now = Date.now();
  if (now - lastShakeTime < SHAKE_COOLDOWN) return;
  lastShakeTime = now;
  dropRandomLeaf();
  showToast('🍂 一片葉子跌咗落嚟！');
});

// Also allow click on shake hint
document.getElementById('shake-hint').addEventListener('click', () => {
  if (leaves.length === 0) return;
  const now = Date.now();
  if (now - lastShakeTime < SHAKE_COOLDOWN) return;
  lastShakeTime = now;
  dropRandomLeaf();
  showToast('🍂 一片葉子跌咗落嚟！');
});

// ─────────────────────────────────────
//  INIT
// ─────────────────────────────────────
function init() {
  loadLeaves();
  resizeTree();
  drawTree();
  animate();
  requestMotionPermission();

  // Show initial toast if there are saved leaves
  if (leaves.length > 0) {
    setTimeout(() => showToast(`樹上有 ${leaves.length} 片葉子等緊你 🌿`), 800);
  }
}

window.addEventListener('load', init);
</script>
</body>
</html>
