<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>樹窿 - Tree Hollow</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #050510;
    --bg: #0a0a1a;
    --neon: #00ff88;
    --neon-soft: #66ffaa;
    --neon-dim: #009944;
    --accent: #ff5588;
    --accent-soft: #ff88aa;
    --gold: #ffcc33;
    --gold-soft: #ffe088;
    --panel: #0f0f24;
    --panel-light: #1a1a35;
    --text: #ccffdd;
    --text-dim: #668899;
    --trunk: #3d2b1f;
    --trunk-light: #5c4033;
    --trunk-dark: #1e1008;
    --canopy-dark: #0a3d1a;
    --canopy-mid: #0d5e24;
    --canopy-light: #1a8a30;
    --canopy-glow: #2ecc50;
    --canopy-spark: #5eff7e;
    --ground: #0d1a0d;
  }

  body {
    background: var(--bg-deep);
    font-family: 'VT323', 'Courier New', monospace;
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ─── STARFIELD ─── */
  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ─── AMBIENT PARTICLES ─── */
  #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ─── HEADER ─── */
  header {
    position: relative; z-index: 2;
    text-align: center; padding: 24px 16px 4px;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(13px, 3.2vw, 20px);
    color: var(--neon);
    text-shadow:
      0 0 8px var(--neon),
      0 0 20px var(--neon),
      0 0 40px var(--neon-dim),
      0 0 80px var(--neon-dim);
    letter-spacing: 6px;
    image-rendering: pixelated;
    line-height: 1.6;
  }
  header .subtitle {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 3px;
    opacity: 0.8;
  }
  .version-badge {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ff9944;
    border: 2px solid #ff9944;
    padding: 4px 10px;
    margin-top: 8px;
    letter-spacing: 2px;
    text-shadow: 0 0 6px #ff9944;
    box-shadow: 0 0 10px rgba(255,153,68,0.3);
    image-rendering: pixelated;
  }
  .leaf-counter {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--gold);
    margin-top: 10px;
    text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold);
    letter-spacing: 1px;
  }
  .leaf-counter span { font-size: 22px; }

  /* ─── CANVAS CONTAINER ─── */
  #tree-container {
    position: relative; z-index: 2;
    width: 100%; max-width: 520px;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 280px;
  }
  #treeCanvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ─── PICK LEAF BUTTON ─── */
  #pick-leaf-area {
    position: relative; z-index: 2;
    text-align: center; padding: 4px 16px 8px;
  }
  #pick-leaf-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(180deg, #1a2a0d 0%, #0d1a05 100%);
    border: 3px solid #6a994e;
    color: #a7c957;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2vw, 12px);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.25s;
    text-shadow: 0 0 8px #a7c957;
    image-rendering: pixelated;
    box-shadow: 0 0 16px rgba(167,201,87,0.2), inset 0 1px 0 rgba(167,201,87,0.08);
    position: relative;
    overflow: hidden;
    animation: leaf-btn-glow 3s ease-in-out infinite;
  }
  #pick-leaf-btn::after {
    content: '';
    position: absolute; inset: 3px;
    border: 1px solid rgba(167,201,87,0.2);
    pointer-events: none;
  }
  #pick-leaf-btn:hover, #pick-leaf-btn:active {
    background: linear-gradient(180deg, #2a3d14 0%, #1a2a0d 100%);
    border-color: #a7c957;
    color: #ccff88;
    box-shadow: 0 0 32px rgba(167,201,87,0.5), inset 0 0 16px rgba(167,201,87,0.15);
    transform: scale(1.03);
  }
  #pick-leaf-btn:active { transform: scale(0.96); }
  #pick-leaf-btn:disabled {
    opacity: 0.35; pointer-events: none; filter: grayscale(0.4);
  }
  #pick-leaf-btn .pick-icon {
    font-size: 22px;
    animation: leaf-btn-float 1.5s ease-in-out infinite;
  }
  @keyframes leaf-btn-glow {
    0%,100% { box-shadow: 0 0 16px rgba(167,201,87,0.2), inset 0 1px 0 rgba(167,201,87,0.08); }
    50% { box-shadow: 0 0 28px rgba(167,201,87,0.4), inset 0 1px 0 rgba(167,201,87,0.15); }
  }
  @keyframes leaf-btn-float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* ─── INPUT AREA ─── */
  #input-area {
    position: relative; z-index: 2;
    width: 100%; max-width: 500px;
    padding: 0 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #confession-input {
    width: 100%; height: 82px;
    background: var(--panel);
    border: 3px solid #223344;
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 1px;
    line-height: 1.4;
    caret-color: var(--neon);
  }
  #confession-input:focus {
    border-color: var(--neon);
    box-shadow:
      0 0 20px rgba(0,255,136,0.15),
      inset 0 0 12px rgba(0,255,136,0.04);
  }
  #confession-input::placeholder { color: #334455; letter-spacing: 2px; }

  #submit-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(180deg, #0d2a15 0%, #081a0d 100%);
    border: 3px solid var(--neon);
    color: var(--neon);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 2.6vw, 14px);
    cursor: pointer;
    letter-spacing: 4px;
    transition: all 0.2s;
    text-shadow: 0 0 8px var(--neon);
    image-rendering: pixelated;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 16px rgba(0,255,136,0.2),
      inset 0 1px 0 rgba(0,255,136,0.1);
  }
  #submit-btn::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(0,255,136,0.2);
    pointer-events: none;
  }
  #submit-btn:hover, #submit-btn:active {
    background: linear-gradient(180deg, #143a20 0%, #0d2a15 100%);
    box-shadow:
      0 0 32px rgba(0,255,136,0.5),
      inset 0 0 20px rgba(0,255,136,0.15);
    transform: scale(1.02);
  }
  #submit-btn:active { transform: scale(0.97); }
  #submit-btn:disabled { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }

  /* ─── FLYING LEAF ─── */
  .flying-leaf {
    position: fixed; z-index: 20;
    pointer-events: none;
    font-size: 32px;
    filter: drop-shadow(0 0 12px var(--neon)) drop-shadow(0 0 24px var(--neon-dim));
    will-change: transform, left, top;
  }
  .flying-leaf .trail {
    position: absolute;
    font-size: 14px;
    opacity: 0.3;
    filter: drop-shadow(0 0 6px var(--neon));
  }

  /* ─── MODAL OVERLAY ─── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(2,2,10,0.9);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  #modal-overlay.active { opacity: 1; pointer-events: all; }

  #modal-card {
    background: var(--panel);
    border: 4px solid var(--gold);
    padding: 32px 28px;
    max-width: 400px; width: 92%;
    text-align: center;
    box-shadow:
      0 0 40px rgba(255,204,51,0.3),
      0 0 80px rgba(255,204,51,0.12),
      0 0 120px rgba(255,204,51,0.05);
    image-rendering: pixelated;
    position: relative;
  }
  #modal-card::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255,204,51,0.25);
    pointer-events: none;
  }
  #modal-card .leaf-icon {
    font-size: 56px; margin-bottom: 16px;
    animation: leaf-spin 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes leaf-spin {
    0% { transform: rotate(0deg) scale(0); opacity: 0; filter: blur(4px); }
    50% { transform: rotate(540deg) scale(1.4); opacity: 1; filter: blur(0); }
    100% { transform: rotate(720deg) scale(1); opacity: 1; filter: blur(0); }
  }
  #modal-card .confession-text {
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: var(--text);
    line-height: 1.6;
    margin: 16px 0;
    letter-spacing: 1px;
    word-break: break-word;
    text-shadow: 0 0 10px rgba(204,255,221,0.3);
  }
  #modal-card .leaf-author {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #modal-card .close-btn {
    margin-top: 18px; padding: 12px 36px;
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.2s;
    text-shadow: 0 0 6px var(--gold);
    image-rendering: pixelated;
  }
  #modal-card .close-btn:hover {
    background: rgba(255,204,51,0.15);
    box-shadow: 0 0 20px rgba(255,204,51,0.4), inset 0 0 10px rgba(255,204,51,0.1);
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: var(--panel);
    border: 2px solid var(--neon);
    color: var(--neon);
    padding: 14px 32px;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    box-shadow: 0 0 24px rgba(0,255,136,0.4), 0 0 48px rgba(0,255,136,0.15);
    animation: toast-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), toast-out 0.3s ease-in 2.2s forwards;
    letter-spacing: 2px;
    text-shadow: 0 0 6px var(--neon);
    white-space: nowrap;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(24px) scale(0.9); }
  }
  @keyframes toast-out {
    to { opacity: 0; transform: translateX(-50%) translateY(-16px) scale(0.9); filter: blur(3px); }
  }

  /* ─── SPARKLE BURST ─── */
  .sparkle {
    position: fixed;
    z-index: 150;
    pointer-events: none;
    width: 4px; height: 4px;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-soft);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 400px) {
    header h1 { font-size: 11px; letter-spacing: 4px; }
    header .subtitle { font-size: 18px; }
    #confession-input { height: 72px; font-size: 18px; }
    #modal-card { padding: 24px 18px; }
    #modal-card .confession-text { font-size: 20px; }
    #pick-leaf-btn { padding: 10px 20px; font-size: 9px; letter-spacing: 1px; }
  }

  /* ─── PIXEL SCANLINES SUBTLE ─── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 999;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<canvas id="particles"></canvas>

<header>
  <h1>🌳 樹 窿 🌳</h1>
  <div class="version-badge">測試版 v0.1</div>
  <div class="subtitle">講低你嘅心事，掛喺樹上面</div>
  <div class="leaf-counter">✦ 樹上共有 <span id="leaf-count">0</span> 片葉 ✦</div>
</header>

<div id="tree-container">
  <canvas id="treeCanvas"></canvas>
</div>

<div id="pick-leaf-area">
  <button id="pick-leaf-btn"><span class="pick-icon">🍂</span> 執起一片樹葉</button>
</div>

<div id="input-area">
  <textarea id="confession-input" placeholder="喺度寫低你嘅心事..." maxlength="280"></textarea>
  <button id="submit-btn">✦ 講 比 樹 窿 ✦</button>
</div>

<div id="modal-overlay">
  <div id="modal-card">
    <div class="leaf-icon">🍂</div>
    <div class="leaf-author">── 你執起咗一片樹葉 ──</div>
    <div class="confession-text" id="modal-text"></div>
    <button class="close-btn" id="modal-close">放 返 上 樹</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  STARFIELD — Parallax depth layers
// ═══════════════════════════════════════
const starCanvas = document.getElementById('starfield');
const starCtx = starCanvas.getContext('2d');
let stars = [];

function resizeStarfield() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
function createStars() {
  stars = [];
  const count = Math.floor((starCanvas.width * starCanvas.height) / 800);
  for (let i = 0; i < count; i++) {
    const depth = Math.random(); // 0=far 1=near
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: depth * 1.8 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.008 + Math.random() * 0.04,
      depth,
      hue: 180 + Math.random() * 60, // blue-ish stars
      baseAlpha: 0.15 + depth * 0.6,
    });
  }
}
function drawStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    s.twinkle += s.speed;
    const alpha = s.baseAlpha + 0.2 * Math.sin(s.twinkle);
    starCtx.fillStyle = `hsla(${s.hue},60%,75%,${alpha})`;
    const pr = Math.max(1, Math.ceil(s.r));
    starCtx.fillRect(Math.round(s.x), Math.round(s.y), pr, pr);
    // Bright core for near stars
    if (s.depth > 0.6 && Math.sin(s.twinkle) > 0.7) {
      starCtx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
      starCtx.fillRect(Math.round(s.x), Math.round(s.y), 1, 1);
    }
  }
  requestAnimationFrame(drawStars);
}
resizeStarfield();
createStars();
drawStars();
window.addEventListener('resize', () => { resizeStarfield(); createStars(); });

// ═══════════════════════════════════════
//  AMBIENT FIREFLY PARTICLES
// ═══════════════════════════════════════
const particlesCanvas = document.getElementById('particles');
const pCtx = particlesCanvas.getContext('2d');
let fireflies = [];

function resizeParticles() {
  particlesCanvas.width = window.innerWidth;
  particlesCanvas.height = window.innerHeight;
}
function createFireflies() {
  fireflies = [];
  for (let i = 0; i < 25; i++) {
    fireflies.push({
      x: Math.random() * particlesCanvas.width,
      y: Math.random() * particlesCanvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      life: Math.random() * Math.PI * 2,
      size: 1 + Math.random() * 2,
      glow: 0.3 + Math.random() * 0.5,
      hue: Math.random() > 0.5 ? 120 : 45, // green or gold
    });
  }
}
function drawFireflies() {
  pCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
  for (const f of fireflies) {
    f.life += 0.02;
    f.x += f.vx + Math.sin(f.life * 1.3) * 0.4;
    f.y += f.vy + Math.cos(f.life * 0.7) * 0.4;
    // Wrap around
    if (f.x < -20) f.x = particlesCanvas.width + 20;
    if (f.x > particlesCanvas.width + 20) f.x = -20;
    if (f.y < -20) f.y = particlesCanvas.height + 20;
    if (f.y > particlesCanvas.height + 20) f.y = -20;
    // Draw glow
    const alpha = f.glow * (0.5 + 0.5 * Math.sin(f.life * 2.5));
    const gradient = pCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 8);
    gradient.addColorStop(0, `hsla(${f.hue},100%,70%,${alpha})`);
    gradient.addColorStop(0.4, `hsla(${f.hue},100%,50%,${alpha * 0.3})`);
    gradient.addColorStop(1, 'transparent');
    pCtx.fillStyle = gradient;
    pCtx.fillRect(f.x - f.size * 8, f.y - f.size * 8, f.size * 16, f.size * 16);
    // Core
    pCtx.fillStyle = `hsla(${f.hue},100%,85%,${alpha})`;
    pCtx.fillRect(Math.round(f.x), Math.round(f.y), Math.ceil(f.size), Math.ceil(f.size));
  }
  requestAnimationFrame(drawFireflies);
}
resizeParticles();
createFireflies();
drawFireflies();
window.addEventListener('resize', () => { resizeParticles(); createFireflies(); });

// ═══════════════════════════════════════
//  PIXEL ART TREE — Rich layered canopy
// ═══════════════════════════════════════
const treeCanvas = document.getElementById('treeCanvas');
const treeCtx = treeCanvas.getContext('2d');
const PIXEL = 7;

function resizeTree() {
  const container = document.getElementById('tree-container');
  treeCanvas.width = container.clientWidth;
  treeCanvas.height = container.clientHeight;
  treeData = buildTreePixels();
  renderTree();
}
window.addEventListener('resize', resizeTree);

const TRUNK_COLOR = '#3d2b1f';
const TRUNK_HIGHLIGHT = '#5c4033';
const TRUNK_DARK = '#1e1008';
const CANOPY_DEEP = '#052e12';
const CANOPY_DARK = '#0a4d1e';
const CANOPY_MID = '#0f6b28';
const CANOPY_LIGHT = '#1a8a30';
const CANOPY_GLOW = '#2ecc50';
const CANOPY_SPARK = '#5eff7e';

function buildTreePixels() {
  const pixels = [];
  const cx = Math.floor(treeCanvas.width / 2 / PIXEL);
  const baseY = Math.floor(treeCanvas.height * 0.94 / PIXEL);

  // ── ROOTS ──
  const rootDefs = [
    { dx: -8, dy: 0, len: 8 }, { dx: 8, dy: 0, len: 8 },
    { dx: -12, dy: 1, len: 5 }, { dx: 12, dy: 1, len: 5 },
  ];
  for (const r of rootDefs) {
    for (let i = 0; i < r.len; i++) {
      const col = cx + r.dx + Math.sign(r.dx) * Math.floor(i * 0.4);
      const row = baseY + r.dy + Math.floor(i * 0.5);
      pixels.push({ col, row, color: TRUNK_DARK });
    }
  }

  // ── TRUNK ──
  for (let row = baseY - 22; row <= baseY; row++) {
    let trunkW;
    if (row > baseY - 4) trunkW = 8;       // base flare
    else if (row > baseY - 12) trunkW = 7;
    else if (row > baseY - 18) trunkW = 6;
    else trunkW = 5;
    const startX = cx - Math.floor(trunkW / 2);
    for (let i = 0; i < trunkW; i++) {
      const col = startX + i;
      let color = TRUNK_COLOR;
      if (i === 0) color = TRUNK_DARK;
      else if (i === trunkW - 1) color = TRUNK_DARK;
      else if (i === Math.floor(trunkW / 2)) color = TRUNK_HIGHLIGHT;
      pixels.push({ col, row, color });
    }
  }

  // ── TREE HOLLOW — dark oval carved into trunk ──
  const HOLLOW_CY = baseY - 13;
  const HOLLOW_RX = 3; // horizontal radius
  const HOLLOW_RY = 5; // vertical radius
  const HOLLOW_COLOR = '#030805';
  const HOLLOW_RIM = '#0d1a0d';
  // Remove existing trunk pixels inside the hollow ellipse
  for (let i = pixels.length - 1; i >= 0; i--) {
    const p = pixels[i];
    const dx = (p.col - cx) / HOLLOW_RX;
    const dy = (p.row - HOLLOW_CY) / HOLLOW_RY;
    if (dx * dx + dy * dy <= 1) {
      pixels.splice(i, 1);
    }
  }
  // Paint hollow
  for (let dr = -HOLLOW_RY - 1; dr <= HOLLOW_RY + 1; dr++) {
    for (let dc = -HOLLOW_RX - 1; dc <= HOLLOW_RX + 1; dc++) {
      const ndx = dc / HOLLOW_RX;
      const ndy = dr / HOLLOW_RY;
      const ndist = ndx * ndx + ndy * ndy;
      if (ndist <= 1.05) {
        const col = cx + dc;
        const row = HOLLOW_CY + dr;
        const color = ndist < 0.6 ? HOLLOW_COLOR
          : ndist < 0.85 ? '#051008'
          : HOLLOW_RIM;
        pixels.push({ col, row, color });
      }
    }
  }

  // ── CANOPY — multiple layered blobs ──
  const canopyBlobs = [
    { cy: baseY - 30, r: 14, fillChance: 0.88, hues: [CANOPY_DEEP, CANOPY_DARK, CANOPY_MID] },
    { cy: baseY - 36, r: 16, fillChance: 0.85, hues: [CANOPY_DARK, CANOPY_MID, CANOPY_LIGHT] },
    { cy: baseY - 42, r: 17, fillChance: 0.82, hues: [CANOPY_MID, CANOPY_LIGHT, CANOPY_GLOW] },
    { cy: baseY - 48, r: 15, fillChance: 0.80, hues: [CANOPY_MID, CANOPY_LIGHT, CANOPY_GLOW] },
    { cy: baseY - 53, r: 13, fillChance: 0.78, hues: [CANOPY_LIGHT, CANOPY_GLOW, CANOPY_SPARK] },
    { cy: baseY - 56, r: 10, fillChance: 0.75, hues: [CANOPY_LIGHT, CANOPY_GLOW, CANOPY_SPARK] },
    { cy: baseY - 58, r: 7, fillChance: 0.72, hues: [CANOPY_GLOW, CANOPY_SPARK] },
    { cy: baseY - 60, r: 5, fillChance: 0.70, hues: [CANOPY_GLOW, CANOPY_SPARK] },
    // Side branches
    { cy: baseY - 28, r: 8, fillChance: 0.85, hues: [CANOPY_DEEP, CANOPY_DARK, CANOPY_MID], offsetX: -10 },
    { cy: baseY - 28, r: 8, fillChance: 0.85, hues: [CANOPY_DEEP, CANOPY_DARK, CANOPY_MID], offsetX: 10 },
    { cy: baseY - 32, r: 9, fillChance: 0.82, hues: [CANOPY_DARK, CANOPY_MID, CANOPY_LIGHT], offsetX: -12 },
    { cy: baseY - 32, r: 9, fillChance: 0.82, hues: [CANOPY_DARK, CANOPY_MID, CANOPY_LIGHT], offsetX: 12 },
    { cy: baseY - 38, r: 7, fillChance: 0.80, hues: [CANOPY_MID, CANOPY_LIGHT, CANOPY_GLOW], offsetX: -13 },
    { cy: baseY - 38, r: 7, fillChance: 0.80, hues: [CANOPY_MID, CANOPY_LIGHT, CANOPY_GLOW], offsetX: 13 },
  ];

  const occupied = new Set(pixels.map(p => `${p.col},${p.row}`));

  for (const blob of canopyBlobs) {
    const bcx = cx + (blob.offsetX || 0);
    for (let dr = -blob.r - 1; dr <= blob.r + 1; dr++) {
      for (let dc = -blob.r - 1; dc <= blob.r + 1; dc++) {
        const dist = Math.sqrt(dr * dr + dc * dc);
        if (dist > blob.r + 0.5) continue;
        if (dist < blob.r - 0.5 || Math.random() < blob.fillChance) {
          const col = bcx + dc;
          const row = blob.cy + dr;
          const key = `${col},${row}`;
          if (occupied.has(key)) continue;
          // Shade based on distance from center and randomness
          const shadeRand = Math.random();
          const depthFactor = (dist / blob.r);
          let color;
          if (shadeRand < 0.05) color = blob.hues[blob.hues.length - 1]; // spark
          else if (shadeRand < 0.2) color = blob.hues[Math.min(blob.hues.length - 1, Math.floor(shadeRand * blob.hues.length * 2))];
          else if (depthFactor < 0.4) color = blob.hues[Math.min(blob.hues.length - 2, Math.floor(Math.random() * blob.hues.length))];
          else color = blob.hues[Math.floor(Math.random() * Math.min(2, blob.hues.length))];
          pixels.push({ col, row, color });
          occupied.add(key);
        }
      }
    }
  }

  return { pixels, cx, baseY };
}

let treeData = null;

function drawTree() {
  treeData = buildTreePixels();
  renderTree();
}

let swayOffset = 0;
function renderTree() {
  treeCtx.clearRect(0, 0, treeCanvas.width, treeCanvas.height);
  if (!treeData) return;

  swayOffset = Math.sin(performance.now() * 0.0003) * 0.7;

  // ── GROUND ──
  const groundY = Math.floor(treeCanvas.height * 0.96);
  const grad = treeCtx.createLinearGradient(0, groundY, 0, treeCanvas.height);
  grad.addColorStop(0, '#0d1a0d');
  grad.addColorStop(0.5, '#071207');
  grad.addColorStop(1, '#030a03');
  treeCtx.fillStyle = grad;
  treeCtx.fillRect(0, groundY, treeCanvas.width, treeCanvas.height - groundY);
  // Ground pixel texture
  for (let x = 0; x < treeCanvas.width; x += PIXEL) {
    const shade = Math.random();
    treeCtx.fillStyle = shade > 0.6 ? '#1a2e1a' : shade > 0.3 ? '#112211' : '#0a180a';
    treeCtx.fillRect(x, groundY, PIXEL, PIXEL);
    if (Math.random() > 0.7) {
      treeCtx.fillStyle = '#1a301a';
      treeCtx.fillRect(x + 2, groundY - PIXEL + 2, 2, 2);
    }
  }

  // ── GRASS TUFFS ──
  treeCtx.fillStyle = '#1a3a1a';
  for (let x = 4; x < treeCanvas.width - 4; x += PIXEL * 2) {
    if (Math.random() > 0.5) {
      treeCtx.fillRect(x, groundY - PIXEL, PIXEL * 0.5, PIXEL);
    }
  }

  // ── TREE PIXELS (with slight sway for canopy) ──
  for (const p of treeData.pixels) {
    const isCanopy = p.color !== TRUNK_COLOR && p.color !== TRUNK_HIGHLIGHT
      && p.color !== TRUNK_DARK;
    const sx = isCanopy ? swayOffset * (1 - (treeData.baseY - p.row) / 60) : 0;

    if (p.color === CANOPY_SPARK && Math.random() > 0.9) {
      // Occasional sparkle glint
      treeCtx.fillStyle = '#aaffcc';
    } else {
      treeCtx.fillStyle = p.color;
    }
    treeCtx.fillRect(
      Math.round((p.col + sx) * PIXEL),
      p.row * PIXEL,
      PIXEL, PIXEL
    );
  }

  // ── CANOPY GLOW OVERLAY ──
  const glowCx = treeData.cx * PIXEL + PIXEL / 2;
  const glowCy = (treeData.baseY - 42) * PIXEL;
  const glowGrad = treeCtx.createRadialGradient(glowCx, glowCy, PIXEL * 6, glowCx, glowCy, PIXEL * 22);
  glowGrad.addColorStop(0, 'rgba(46,204,80,0.06)');
  glowGrad.addColorStop(0.5, 'rgba(26,138,48,0.03)');
  glowGrad.addColorStop(1, 'transparent');
  treeCtx.fillStyle = glowGrad;
  treeCtx.fillRect(0, 0, treeCanvas.width, treeCanvas.height);

  // ── TREE HOLLOW GLOW ──
  const hollowPx = treeData.cx * PIXEL + PIXEL / 2;
  const hollowPy = (treeData.baseY - 13) * PIXEL;
  const hollowGlow = treeCtx.createRadialGradient(hollowPx, hollowPy, PIXEL * 1, hollowPx, hollowPy, PIXEL * 7);
  hollowGlow.addColorStop(0, 'rgba(255,200,100,0.08)');
  hollowGlow.addColorStop(0.5, 'rgba(255,180,60,0.03)');
  hollowGlow.addColorStop(1, 'transparent');
  treeCtx.fillStyle = hollowGlow;
  treeCtx.fillRect(hollowPx - PIXEL * 7, hollowPy - PIXEL * 7, PIXEL * 14, PIXEL * 14);

  // ── LEAVES ──
  for (const leaf of leaves) {
    drawLeaf(leaf);
  }

  // ── SWAYING SPARKLE DOTS IN CANOPY ──
  const now = performance.now() * 0.001;
  for (let i = 0; i < 8; i++) {
    const sx = treeData.cx + Math.sin(now * 1.7 + i * 1.3) * 10;
    const sy = treeData.baseY - 35 + Math.cos(now * 1.3 + i) * 22;
    const alpha = 0.3 + 0.3 * Math.sin(now * 3 + i * 2);
    treeCtx.fillStyle = `rgba(180,255,200,${alpha})`;
    const ps = Math.ceil(1 + Math.sin(now * 2 + i) * 1);
    treeCtx.fillRect(Math.round(sx * PIXEL), Math.round(sy * PIXEL), ps, ps);
  }
}

// ═══════════════════════════════════════
//  API CONFIG
// ═══════════════════════════════════════
const API_BASE = 'https://treehollow-api.onrender.com';
// const API_BASE = 'http://localhost:3000'; // local dev

// ═══════════════════════════════════════
//  LEAVES — Colorful pixel leaves
// ═══════════════════════════════════════
const LEAF_COLORS = [
  '#ff5c3a','#ff7b4a','#ff9933','#ffbb22','#ffdd00',
  '#e8453c','#f0725a','#f4a261','#e9c46a',
  '#d44a6a','#c77d5a','#b5835a',
  '#a7c957','#6a994e',
];
const LEAF_EMOJIS = ['🍂','🍁','🍃','🌿','🍀','💚','🌱','✨'];

class Leaf {
  constructor(text, id) {
    this.id = id || (Date.now() + '_' + Math.random().toString(36).slice(2, 9));
    this.text = text;
    this.color = LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)];
    this.emoji = LEAF_EMOJIS[Math.floor(Math.random() * LEAF_EMOJIS.length)];
    this.size = 10 + Math.random() * 10;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.5 + Math.random() * 1.5;
    this._assignPosition();
  }

  _assignPosition() {
    if (treeData) {
      const canopyPixels = treeData.pixels.filter(p =>
        !p.color.startsWith('#3d') && !p.color.startsWith('#5c') && !p.color.startsWith('#1e') &&
        p.color !== CANOPY_DEEP
      );
      const pick = canopyPixels[Math.floor(Math.random() * canopyPixels.length)]
        || { col: treeData.cx, row: treeData.baseY - 40 };
      this.col = pick.col + (Math.random() - 0.5) * 8;
      this.row = pick.row + (Math.random() - 0.5) * 5;
    } else {
      this.col = 0;
      this.row = -40;
    }
  }

  toData() {
    return {
      id: this.id,
      text: this.text,
      color: this.color,
      emoji: this.emoji,
      size: this.size,
      wobble: this.wobble,
      wobbleSpeed: this.wobbleSpeed,
    };
  }

  static fromData(d) {
    const l = new Leaf(d.text, d.id);
    l.color = d.color || l.color;
    l.emoji = d.emoji || l.emoji;
    l.size = d.size || l.size;
    l.wobble = d.wobble || l.wobble;
    l.wobbleSpeed = d.wobbleSpeed || l.wobbleSpeed;
    l._assignPosition();
    return l;
  }
}

let leaves = [];

// ── API helpers ──
async function apiFetch(path, options = {}) {
  const url = API_BASE + path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

async function loadLeaves() {
  try {
    const data = await apiFetch('/api/leaves');
    leaves = data.map(d => Leaf.fromData(d));
    console.log(`🌿 Loaded ${leaves.length} leaves from server`);
  } catch(e) {
    console.warn('⚠️  Cannot reach server, loading local cache...');
    try {
      const raw = localStorage.getItem('treehollow_v2_leaves');
      if (raw) {
        const data = JSON.parse(raw);
        leaves = data.map(d => Leaf.fromData(d));
      }
    } catch(e2) { leaves = []; }
  }
}

async function apiAddLeaf(text) {
  const tempLeaf = new Leaf(text);
  const payload = tempLeaf.toData();
  try {
    const saved = await apiFetch('/api/leaves', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    tempLeaf.id = saved.id;
    leaves.push(tempLeaf);
    return tempLeaf;
  } catch(e) {
    // Fallback: keep locally
    leaves.push(tempLeaf);
    localStorage.setItem('treehollow_v2_leaves', JSON.stringify(leaves.map(l => l.toData())));
    return tempLeaf;
  }
}

async function apiRemoveLeaf(leafId) {
  try {
    await apiFetch(`/api/leaves/${leafId}`, { method: 'DELETE' });
  } catch(e) {
    // Fallback: remove locally
  }
  const idx = leaves.findIndex(l => l.id === leafId);
  if (idx !== -1) {
    const [removed] = leaves.splice(idx, 1);
    localStorage.setItem('treehollow_v2_leaves', JSON.stringify(leaves.map(l => l.toData())));
    return removed;
  }
  return null;
}

function drawLeaf(leaf) {
  if (!treeData) return;
  const x = leaf.col * PIXEL;
  const y = leaf.row * PIXEL;
  const wobbleX = swayOffset * (1 - (treeData.baseY - leaf.row) / 60);
  treeCtx.save();
  treeCtx.translate(x + wobbleX, y);
  treeCtx.rotate(Math.sin(leaf.wobble + performance.now() * 0.001 * leaf.wobbleSpeed) * 0.18);
  const s = leaf.size;
  // Diamond pixel leaf shape
  treeCtx.fillStyle = leaf.color;
  treeCtx.fillRect(0, -Math.floor(s * 0.9), 2, Math.floor(s * 1.6));
  treeCtx.fillRect(-2, -Math.floor(s * 0.5), 2, Math.floor(s));
  treeCtx.fillRect(2, -Math.floor(s * 0.5), 2, Math.floor(s));
  treeCtx.fillRect(-4, -Math.floor(s * 0.15), 2, Math.floor(s * 0.4));
  treeCtx.fillRect(4, -Math.floor(s * 0.15), 2, Math.floor(s * 0.4));
  // Highlight
  treeCtx.fillStyle = 'rgba(255,255,255,0.25)';
  treeCtx.fillRect(0, -Math.floor(s * 0.8), 1, Math.floor(s * 0.5));
  // Stem
  treeCtx.fillStyle = '#8B7355';
  treeCtx.fillRect(-1, Math.floor(s * 0.7), 2, 5);
  treeCtx.restore();
}

// ═══════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════
function animate() {
  renderTree();
  document.getElementById('leaf-count').textContent = leaves.length;
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════
//  FLYING LEAF — Curved path animation
// ═══════════════════════════════════════
function animateFlyingLeaf(fromRect, leaf) {
  const containerRect = treeCanvas.getBoundingClientRect();
  const targetX = leaf.col * PIXEL + containerRect.left + PIXEL / 2;
  const targetY = leaf.row * PIXEL + containerRect.top + PIXEL / 2;

  const startX = fromRect.left + fromRect.width / 2;
  const startY = fromRect.top + fromRect.height / 2;

  const el = document.createElement('div');
  el.className = 'flying-leaf';
  el.textContent = leaf.emoji;
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';
  el.style.transform = 'scale(0.3)';
  document.body.appendChild(el);

  // Trail elements
  const trailCount = 5;
  const trails = [];
  for (let i = 0; i < trailCount; i++) {
    const t = document.createElement('div');
    t.className = 'trail';
    t.textContent = leaf.emoji;
    t.style.position = 'absolute';
    t.style.left = '0px';
    t.style.top = '0px';
    el.appendChild(t);
    trails.push(t);
  }

  const duration = 1200;
  const startTime = performance.now();

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Ease-out + arc
    const ease = 1 - Math.pow(1 - t, 3);
    const arc = -Math.sin(t * Math.PI) * 80;
    const cx = startX + (targetX - startX) * ease;
    const cy = startY + (targetY - startY) * ease + arc;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    const scale = 0.3 + ease * 0.7;
    const rotation = ease * 720;
    el.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
    el.style.opacity = t > 0.85 ? 1 - (t - 0.85) / 0.15 : 1;

    // Trail
    for (let i = 0; i < trails.length; i++) {
      const trailT = Math.max(0, t - (i + 1) * 0.06);
      const trailEase = 1 - Math.pow(1 - trailT, 3);
      const trailArc = -Math.sin(trailT * Math.PI) * 80;
      const tx = startX + (targetX - startX) * trailEase;
      const ty = startY + (targetY - startY) * trailEase + trailArc;
      trails[i].style.left = (tx - cx) + 'px';
      trails[i].style.top = (ty - cy) + 'px';
      trails[i].style.opacity = trailT > 0 ? 0.25 * (1 - i / trailCount) * (1 - trailT) : 0;
    }

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      el.remove();
      // Sparkle burst at destination
      spawnSparkles(targetX, targetY, leaf.color);
    }
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════
//  SPARKLE BURST
// ═══════════════════════════════════════
function spawnSparkles(x, y, color) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.background = color;
    sparkle.style.boxShadow = `0 0 6px ${color}, 0 0 14px ${color}`;
    const angle = (Math.PI * 2 * i) / count;
    const dist = 30 + Math.random() * 40;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    sparkle.style.transition = 'all 0.7s cubic-bezier(0, 0.7, 0.3, 1)';
    document.body.appendChild(sparkle);

    requestAnimationFrame(() => {
      sparkle.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
      sparkle.style.opacity = '0';
    });
    setTimeout(() => sparkle.remove(), 800);
  }
}

// ═══════════════════════════════════════
//  SUBMIT CONFESSION
// ═══════════════════════════════════════
const inputEl = document.getElementById('confession-input');
const submitBtn = document.getElementById('submit-btn');

async function submitConfession() {
  const text = inputEl.value.trim();
  if (!text) return;

  submitBtn.disabled = true;
  if (!treeData) treeData = buildTreePixels();

  const leaf = await apiAddLeaf(text);
  const btnRect = submitBtn.getBoundingClientRect();
  animateFlyingLeaf(btnRect, leaf);

  inputEl.value = '';
  setTimeout(() => { submitBtn.disabled = false; inputEl.focus(); }, 1300);
}

submitBtn.addEventListener('click', submitConfession);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitConfession();
  }
});

// ═══════════════════════════════════════
//  PICK LEAF BUTTON
// ═══════════════════════════════════════
let lastPickTime = 0;
const PICK_COOLDOWN = 2000;

async function dropRandomLeaf() {
  if (leaves.length === 0) return;
  const idx = Math.floor(Math.random() * leaves.length);
  const leaf = leaves[idx];

  // Remove from server + local
  await apiRemoveLeaf(leaf.id);

  // Drop animation: sparkles at leaf position
  if (treeData) {
    const dropX = leaf.col * PIXEL + treeCanvas.getBoundingClientRect().left;
    const dropY = leaf.row * PIXEL + treeCanvas.getBoundingClientRect().top;
    spawnDropSparkles(dropX, dropY);
  }

  showModal(leaf);
}

function spawnDropSparkles(x, y) {
  for (let i = 0; i < 16; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.background = '#ffcc33';
    sparkle.style.boxShadow = '0 0 8px #ffcc33, 0 0 18px #ffe088';
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 50;
    sparkle.style.transition = 'all 0.6s ease-out';
    document.body.appendChild(sparkle);
    requestAnimationFrame(() => {
      sparkle.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist + 20}px) scale(0)`;
      sparkle.style.opacity = '0';
    });
    setTimeout(() => sparkle.remove(), 700);
  }
}

document.getElementById('pick-leaf-btn').addEventListener('click', () => {
  if (leaves.length === 0) {
    showToast('樹上仲未有葉喎 🌿');
    return;
  }
  const now = Date.now();
  if (now - lastPickTime < PICK_COOLDOWN) return;
  lastPickTime = now;
  if (leaves.length === 1) {
    showToast('🍂 最後一片葉跌咗落嚟！');
  }
  dropRandomLeaf();
});

// ═══════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════
function showModal(leaf) {
  const overlay = document.getElementById('modal-overlay');
  const textEl = document.getElementById('modal-text');
  const iconEl = document.querySelector('#modal-card .leaf-icon');
  iconEl.textContent = leaf.emoji;
  textEl.textContent = leaf.text;
  overlay.classList.add('active');

  // Restart spin animation
  iconEl.style.animation = 'none';
  iconEl.offsetHeight;
  iconEl.style.animation = 'leaf-spin 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
}

document.getElementById('modal-close').addEventListener('click', async () => {
  document.getElementById('modal-overlay').classList.remove('active');
  const text = document.getElementById('modal-text').textContent;
  if (text && treeData) {
    await apiAddLeaf(text);
  }
});

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modal-close').click();
  }
});

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2600);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
async function init() {
  await loadLeaves();
  resizeTree();
  drawTree();
  animate();

  if (leaves.length > 0) {
    setTimeout(() => showToast(`樹上有 ${leaves.length} 片葉等緊你 🌿`), 1000);
  }

  // Periodic refresh — check for new leaves from other devices every 8s
  setInterval(async () => {
    try {
      const data = await apiFetch('/api/leaves');
      const serverIds = new Set(data.map(d => d.id));
      // Add new leaves not yet in local state
      for (const d of data) {
        if (!leaves.find(l => l.id === d.id)) {
          leaves.push(Leaf.fromData(d));
        }
      }
      // Remove leaves deleted by others
      leaves = leaves.filter(l => serverIds.has(l.id));
    } catch(e) { /* silent — server might be sleeping */ }
  }, 8000);
}

window.addEventListener('load', init);
window.addEventListener('resize', () => { resizeTree(); });
